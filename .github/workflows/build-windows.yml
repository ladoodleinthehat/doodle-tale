name: Build Windows Executable

on:
  push:
    tags:
      - 'v*' # Triggers on version tags, e.g., v0.1.5
  workflow_dispatch: # Allows you to run this manually from the GitHub Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Compile Executable
        run: |
          mkdir builds -ErrorAction SilentlyContinue
          bun build src/index.ts --compile --target=bun-windows-x64 --outfile ./builds/doodle-tale-beta-v0.1.5.exe

      - name: Upload Artifact
        uses: actions/artifacts@v4
        with:
          name: doodle-tale-windows-build
          path: ./builds/doodle-tale-beta-v0.1.5.exe
